name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-limbo:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            package_dir: x86_64-linux-gnu
            library: libturso_sqlite3.a
          - os: macos-15-intel
            rust_target: x86_64-apple-darwin
            package_dir: x86_64-macos
            library: libturso_sqlite3.a
          - os: macos-14
            rust_target: aarch64-apple-darwin
            package_dir: aarch64-macos
            library: libturso_sqlite3.a
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            package_dir: x86_64-windows-msvc
            library: turso_sqlite3.lib
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build turso_sqlite3
        env:
          RUSTFLAGS: "-C panic=abort"
        run: |
          cargo build --release -p turso_sqlite3 --target "${{ matrix.rust_target }}"
        working-directory: third_party/limbo

      - name: Stage prebuilt library
        run: |
          mkdir -p "prebuilt/${{ matrix.package_dir }}"
          cp "third_party/limbo/target/${{ matrix.rust_target }}/release/${{ matrix.library }}" "prebuilt/${{ matrix.package_dir }}/"

      - uses: actions/upload-artifact@v4
        with:
          name: limbo-lib-${{ matrix.package_dir }}
          path: prebuilt/${{ matrix.package_dir }}/${{ matrix.library }}
          if-no-files-found: error

  source-package:
    runs-on: ubuntu-latest
    needs: build-limbo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: limbo-lib-*
          path: prebuilt
          merge-multiple: true

      - name: Build Zig source package
        run: |
          version="${GITHUB_REF_NAME#v}"
          package="limbo-zig-${version}"
          rm -rf "$package"
          mkdir -p "$package/lib"
          cp build.zig build.zig.zon README.md LICENSE "$package/"
          cp -R src include "$package/"
          cp -R prebuilt/* "$package/lib/"
          tar -czf "${package}.tar.gz" "$package"
          python - <<'PY' "${package}.tar.gz" > "${package}.tar.gz.sha256"
          import hashlib, pathlib, sys
          path = pathlib.Path(sys.argv[1])
          print(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: limbo-zig-source
          path: |
            limbo-zig-*.tar.gz
            limbo-zig-*.tar.gz.sha256
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: source-package
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
